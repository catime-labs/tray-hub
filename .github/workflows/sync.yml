name: Sync catalog

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tray-hub-catalog-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync
        env:
          CATALOG_GITHUB_TOKEN: ${{ secrets.CATALOG_GITHUB_TOKEN }}
      - run: npm test
      - name: Commit catalog changes
        run: |
          if git diff --quiet -- data/collections.json; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/collections.json
          git commit -m "chore: sync animation catalog"
          git push
