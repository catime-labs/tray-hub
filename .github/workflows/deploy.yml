name: Check assets and deploy

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [tray-assets-updated]
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'package-lock.json'
      - 'package.json'
      - 'scripts/**'
      - 'src/**'
      - 'test/**'
      - 'wrangler.jsonc'

permissions:
  contents: write

concurrency:
  group: tray-hub-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: tray-hub
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tray-hub/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: tray-hub
      - name: Discover image repositories
        run: node scripts/checkout-image-repos.mjs
        working-directory: tray-hub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRAY_ASSET_ROOT: ${{ github.workspace }}
      - name: Stage and validate assets
        run: npm run stage
        working-directory: tray-hub
        env:
          TRAY_ASSET_ROOT: ${{ github.workspace }}
      - name: Test Worker
        run: npm test
        working-directory: tray-hub
      - name: Verify staged GIF files
        working-directory: tray-hub
        shell: bash
        run: |
          count=$(find public/assets -type f -iname '*.gif' | wc -l)
          if [[ "$count" -eq 0 ]]; then
            echo "No staged GIF files found."
            exit 1
          fi
          echo "Verified $count staged GIF files."
      - name: Check for changes
        id: changes
        working-directory: tray-hub
        shell: bash
        run: |
          signature=$(
            {
              find src scripts test .github/workflows -type f -print0
              printf '%s\0' package.json package-lock.json wrangler.jsonc data/collections.json data/assets-lock.json
            } | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1
          )
          deployed=$(cat data/deployment-signature.txt 2>/dev/null || true)
          echo "signature=$signature" >> "$GITHUB_OUTPUT"
          if [[ "$signature" != "$deployed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Cloudflare
        if: steps.changes.outputs.changed == 'true'
        working-directory: tray-hub
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Commit deployment state
        if: steps.changes.outputs.changed == 'true'
        working-directory: tray-hub
        env:
          DEPLOYMENT_SIGNATURE: ${{ steps.changes.outputs.signature }}
        run: |
          echo "$DEPLOYMENT_SIGNATURE" > data/deployment-signature.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/collections.json data/assets-lock.json data/deployment-signature.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: record tray deployment"
          git push
